<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Candle</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: black;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
}

/* CENTER WRAPPER */
.wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* PLATE */
.plate {
    width: 240px;
    height: 28px;
    background: linear-gradient(#e6e6e6, #bdbdbd);
    border-radius: 50px;
    box-shadow: 0 0 20px rgba(255,255,255,0.2);
    margin-top: 10px;
}

/* CANDLE (FIXED LOOK) */
.candle {
    width: 90px;
    height: 270px;
    border-radius: 18px;
    position: relative;

    background: linear-gradient(
        to bottom,
        #fff7e6 0%,
        #ffe0b3 30%,
        #ffc98a 60%,
        #eaa46a 100%
    );

    box-shadow:
        inset -10px -12px 18px rgba(0,0,0,0.15),
        inset 10px 12px 18px rgba(255,255,255,0.6),
        0 0 40px rgba(255,200,120,0.25);
}

/* wax shine */
.candle::before {
    content: "";
    position: absolute;
    top: 25px;
    left: 20px;
    width: 10px;
    height: 130px;
    background: rgba(255,255,255,0.35);
    border-radius: 20px;
    filter: blur(1px);
}

/* FLAME (REALISTIC) */
.flame {
    width: 36px;
    height: 36px;
    position: absolute;
    top: -48px;
    left: 50%;
    transform: translateX(-50%);
    border-radius: 50%;

    background: radial-gradient(circle at 30% 30%,
        #fff8b0 0%,
        #ffb347 40%,
        #ff6a00 70%,
        #ff2d00 100%
    );

    box-shadow:
        0 0 25px rgba(255,140,0,0.9),
        0 0 45px rgba(255,80,0,0.4);

    animation: flicker 0.12s infinite alternate;
}

@keyframes flicker {
    from { transform: translateX(-50%) scale(1); }
    to { transform: translateX(-50%) scale(1.25); }
}

/* BALLOONS */
.balloon {
    position: absolute;
    bottom: -150px;
    width: 45px;
    height: 60px;
    border-radius: 50%;
    opacity: 0.9;
    animation: floatUp 7s linear forwards;
}

@keyframes floatUp {
    to { transform: translateY(-130vh); }
}

/* CONFETTI */
.confetti {
    position: fixed;
    width: 10px;
    height: 10px;
    top: -10px;
    animation: fall 2.5s linear forwards;
}

@keyframes fall {
    to {
        transform: translateY(110vh) rotate(720deg);
        opacity: 0;
    }
}

/* POPUPS */
.popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: white;
    color: black;
    padding: 25px 35px;
    border-radius: 16px;
    font-size: 22px;
    display: none;
    z-index: 10;
    text-align: center;
}
</style>
</head>

<body>

<div class="wrapper">
    <div class="candle">
        <div class="flame" id="flame"></div>
    </div>
    <div class="plate"></div>
</div>

<!-- POPUPS -->
<div class="popup" id="startPopup">💨 Blow the candle 💨</div>
<div class="popup" id="endPopup">✨ Make a Wish ✨</div>

<script>
let flame = document.getElementById("flame");

setTimeout(() => startPopup.style.display = "none", 2500);

function balloons() {
    for (let i = 0; i < 35; i++) {
        let b = document.createElement("div");
        b.className = "balloon";

        b.style.left = Math.random() * 100 + "vw";
        b.style.background =
            ["red","blue","yellow","green","purple","orange","pink"][Math.floor(Math.random()*7)];

        b.style.animationDuration = (Math.random() * 4 + 4) + "s";

        document.body.appendChild(b);

        setTimeout(() => b.remove(), 9000);
    }
}

/* CONFETTI */
function confetti() {
    for (let i = 0; i < 120; i++) {
        let c = document.createElement("div");
        c.className = "confetti";

        c.style.left = Math.random() * 100 + "vw";
        c.style.background =
            ["red","yellow","blue","green","purple","pink"][Math.floor(Math.random()*6)];

        c.style.animationDuration = (Math.random() * 2 + 1) + "s";

        document.body.appendChild(c);

        setTimeout(() => c.remove(), 3000);
    }
}
